<?xml version="1.0" encoding="UTF-8"?>
<!-- Golos DMG Finder background 680x430; pads at (160,185) and (520,185). Finder uses bitmap pixels as points even on Retina. -->
<svg xmlns="http://www.w3.org/2000/svg" width="680" height="430" viewBox="0 0 680 430">
  <defs>
    <radialGradient id="glow" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#5b8cff" stop-opacity="0.14"/>
      <stop offset="45%" stop-color="#baff68" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#080b12" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5b8cff" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#baff68" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#baff68" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="padStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5c9efa" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#baff68" stop-opacity="0.28"/>
    </linearGradient>
  </defs>

  <rect width="680" height="430" fill="#080b12"/>
  <rect width="680" height="430" fill="#0d111b" opacity="0.55"/>
  <rect width="680" height="430" fill="url(#glow)"/>

  <line x1="48" y1="1" x2="632" y2="1" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Brand: variant A mark + wordmark -->
  <g transform="translate(36, 28)">
    <g transform="translate(0, 0) scale(0.021484375)">
      <rect width="1024" height="1024" rx="230.4" fill="#0d1224"/>
      <g transform="translate(512 512)">
        <rect x="302.08" y="-28.16" width="163.84" height="56.32" rx="28.16" fill="#5c9efa" transform="rotate(0)"/>
        <rect x="302.08" y="-28.16" width="107.52" height="56.32" rx="28.16" fill="#5aa0f8" transform="rotate(22.5)"/>
        <rect x="302.08" y="-28.16" width="163.84" height="56.32" rx="28.16" fill="#54a6f2" transform="rotate(45)"/>
        <rect x="302.08" y="-28.16" width="107.52" height="56.32" rx="28.16" fill="#4caeea" transform="rotate(67.5)"/>
        <rect x="302.08" y="-28.16" width="163.84" height="56.32" rx="28.16" fill="#42b8e0" transform="rotate(90)"/>
        <rect x="302.08" y="-28.16" width="107.52" height="56.32" rx="28.16" fill="#39c1d7" transform="rotate(112.5)"/>
        <rect x="302.08" y="-28.16" width="163.84" height="56.32" rx="28.16" fill="#30cace" transform="rotate(135)"/>
        <rect x="302.08" y="-28.16" width="107.52" height="56.32" rx="28.16" fill="#2bcfc9" transform="rotate(157.5)"/>
        <rect x="302.08" y="-28.16" width="163.84" height="56.32" rx="28.16" fill="#29d1c7" transform="rotate(180)"/>
        <rect x="302.08" y="-28.16" width="107.52" height="56.32" rx="28.16" fill="#2bcfc9" transform="rotate(202.5)"/>
        <rect x="302.08" y="-28.16" width="163.84" height="56.32" rx="28.16" fill="#30cace" transform="rotate(225)"/>
        <rect x="302.08" y="-28.16" width="107.52" height="56.32" rx="28.16" fill="#39c1d7" transform="rotate(247.5)"/>
        <rect x="302.08" y="-28.16" width="163.84" height="56.32" rx="28.16" fill="#42b8e0" transform="rotate(270)"/>
        <rect x="302.08" y="-28.16" width="107.52" height="56.32" rx="28.16" fill="#4caeea" transform="rotate(292.5)"/>
        <rect x="302.08" y="-28.16" width="163.84" height="56.32" rx="28.16" fill="#54a6f2" transform="rotate(315)"/>
        <rect x="302.08" y="-28.16" width="107.52" height="56.32" rx="28.16" fill="#5aa0f8" transform="rotate(337.5)"/>
      </g>
      <circle cx="512" cy="512" r="200.448" fill="none" stroke="#e0edff" stroke-opacity="0.25" stroke-width="12.288"/>
      <circle cx="512" cy="512" r="148.48" fill="#e0edff"/>
    </g>
    <text x="30" y="16" fill="#f3f5f9" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
          font-size="15" font-weight="700" letter-spacing="-0.4">golos</text>
  </g>

  <!-- Icon pads: golos.app left, Applications right -->
  <g transform="translate(160, 185)">
    <circle r="78" fill="#121827" fill-opacity="0.55" stroke="url(#padStroke)" stroke-width="1.25"/>
    <circle r="64" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  </g>
  <g transform="translate(520, 185)">
    <circle r="78" fill="#121827" fill-opacity="0.55" stroke="url(#padStroke)" stroke-width="1.25"/>
    <circle r="64" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  </g>

  <!-- Finder chooses dark labels in light appearance; these quiet plates keep
       the system-provided app names readable without duplicating the text. -->
  <rect x="112" y="252" width="96" height="28" rx="9" fill="#f3f5f9" fill-opacity="0.88"/>
  <rect x="454" y="252" width="132" height="28" rx="9" fill="#f3f5f9" fill-opacity="0.88"/>

  <!-- Drag arrow -->
  <line x1="250" y1="185" x2="410" y2="185"
        stroke="url(#arrowGrad)" stroke-width="2.5" stroke-linecap="round"
        stroke-dasharray="7 8"/>
  <path d="M408 172 L430 185 L408 198" fill="none" stroke="#baff68"
        stroke-width="2.75" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="340" y="348" text-anchor="middle"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="15" font-weight="600" fill="#f3f5f9" letter-spacing="0.2">Drag golos to Applications</text>
  <text x="340" y="372" text-anchor="middle"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="11" font-weight="500" fill="#939baa" letter-spacing="0.3">macOS 13+  ·  right-click → Open on first launch</text>

  <rect x="0" y="424" width="680" height="6" fill="#baff68" opacity="0.08"/>
</svg>
